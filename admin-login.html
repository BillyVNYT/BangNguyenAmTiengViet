<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: linear-gradient(135deg, #fff9e6, #ffe9a7);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: white;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

input {
    padding: 10px;
    width: 200px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: #ff9800;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="box">
    <h2>🔒 Admin Login</h2>
    <input type="password" id="pass" placeholder="Password">
    <br>
    <button onclick="login()">Login</button>
    <p id="error" style="color:red;"></p>
</div>

<script>
const PASSWORD = "helloadmin";
function login() {
    const input = document.getElementById("pass").value;

    if (input === PASSWORD) {
        sessionStorage.setItem("admin", "true");
        window.location.href = "admin.html";
    } else {
        document.getElementById("error").innerText = "Sai mật khẩu!";
    }
}
</script>

</body>
</html>

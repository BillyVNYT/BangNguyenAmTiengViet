<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Bảng chữ cái âm thanh</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://code.responsivevoice.org/responsivevoice.js?key=vi14SUn7"></script>
</head>
<body>
    <div class="main-title">Bảng nguyên âm tiếng Việt</div>
    <div class="container">
        <!-- VOWELS -->
        <div class="section">
            <div class="title">Vowels</div>
            <div class="grid" id="vowels"></div>
        </div>

        <!-- CONSONANTS -->
        <div class="section">
            <div class="title">Consonants</div>
            <div class="grid" id="consonants"></div>
        </div>

        <!-- DIPHTHONGS -->
        <div class="section">
            <div class="title">Diphthongs</div>
            <div class="grid" id="diphthongs"></div>
        </div>

    </div>
    <div style="
        text-align:center;
        margin-top:40px;
        padding:20px;
        background:white;
        border-radius:20px;
        box-shadow:0 10px 25px rgba(0,0,0,0.08);
    ">

        <h2 style="color:#d4a017;">💛 Ủng hộ dự án</h2>

        <img src="src/QRmomo.jpg" alt="QR MoMo" style="
            width:220px;
            border-radius:20px;
            margin-top:10px;
        ">
        <img src="src/QRpaypal.jpg" alt="QR Paypal" style="
            width:220px;
            border-radius:20px;
            margin-top:10px;
            margin-left: 50px;
        ">

        <p style="color:#888; margin-top:10px;">
            Quét mã MoMo hoặc Paypal để ủng hộ 💛
        </p>

    </div>
    <script src="main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link rel="stylesheet" href="styleAdmin.css">

</head>
<body>

<div class="container">

<h1>📊 Admin Dashboard</h1>

<div class="grid">
    <div class="card">
        <div class="value" id="views">0</div>
        <div class="label">Total Views</div>
    </div>

    <div class="card">
        <div class="value" id="today">0</div>
        <div class="label">Views Today</div>
    </div>

    <div class="card">
        <div class="value" id="maxDay">-</div>
        <div class="label">Best Day</div>
    </div>
</div>

<table>
    <thead>
        <tr>
            <th>Date</th>
            <th>Views</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

</div>

<script type="module" src="admindash.js"></script>

</body>
</html>
